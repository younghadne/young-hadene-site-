<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Young Hadene</title>
    <link rel="stylesheet" href="main.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .login-container, .dashboard-container {
            background-color: #1a1a1a;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            margin: 1rem 0;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #0a0a0a;
            color: white;
        }
        button {
            background-color: #ff0000;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background-color: #cc0000;
        }
        .stats {
            margin-top: 2rem;
        }
        .stat {
            background-color: #2a2a2a;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background-color: #1a1a1a;
            border-radius: 5px;
            overflow: hidden;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #444;
        }
        th {
            background-color: #333;
            color: #fff;
            font-weight: bold;
        }
        td {
            color: #ccc;
        }
        tr:hover td {
            background-color: #333;
        }
    </style>
</head>
<body>
    <div id="login" class="login-container">
        <h2>Admin Login</h2>
        <input type="password" id="password" placeholder="Enter password">
        <button onclick="login()">Login</button>
    </div>
    
    <div id="dashboard" class="dashboard-container" style="display: none;">
        <h2>Admin Dashboard</h2>
        <p>Welcome, Young Hadene.</p>
        
        <div class="stats">
            <div class="stat">
                <h3>Total Page Views</h3>
                <p id="totalViews">Loading...</p>
            </div>
            <div class="stat">
                <h3>Unique Visitors</h3>
                <p id="uniqueVisitors">Loading...</p>
            </div>
            <div class="stat">
                <h3>Top Pages</h3>
                <div id="topPagesTable">Loading...</div>
            </div>
            <div class="stat">
                <h3>Top Referrers</h3>
                <div id="topReferrersTable">Loading...</div>
            </div>
            <div class="stat">
                <h3>Top Countries</h3>
                <div id="topCountriesTable">Loading...</div>
            </div>
            <a href="https://analytics.google.com/" target="_blank" class="inline-block bg-accent hover:bg-accent-hover text-white font-bold py-2 px-4 rounded transition-colors mt-4">
                View Full Google Analytics
            </a>
        </div>
        
        <button onclick="logout()">Logout</button>
    </div>

    <script>
        function login() {
            var password = document.getElementById('password').value;
            fetch('http://localhost:3000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    loadAnalytics();
                } else {
                    alert('Incorrect password');
                }
            })
            .catch(error => alert('Login failed'));
        }
        
        function logout() {
            fetch('http://localhost:3000/api/logout', { method: 'POST' })
            .then(() => {
                document.getElementById('login').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
                document.getElementById('password').value = '';
            })
            .catch(error => alert('Logout failed'));
        }
        
        function loadAnalytics() {
            fetch('http://localhost:3000/api/analytics')
            .then(response => response.json())
            .then(data => {
                document.getElementById('totalViews').textContent = data.totalViews;
                document.getElementById('uniqueVisitors').textContent = data.uniqueVisitors;
                
                const createTable = (items, label1, label2, key1, key2) => {
                    return `<table><thead><tr><th>${label1}</th><th>${label2}</th></tr></thead><tbody>${
                        items.map(item => `<tr><td>${item[key1]}</td><td>${item[key2]}</td></tr>`).join('')
                    }</tbody></table>`;
                };
                
                document.getElementById('topPagesTable').innerHTML = createTable(data.topPages, 'Page', 'Views', 'page', 'count');
                document.getElementById('topReferrersTable').innerHTML = createTable(data.topReferrers, 'Referrer', 'Views', 'referrer', 'count');
                document.getElementById('topCountriesTable').innerHTML = createTable(data.topCountries, 'Country', 'Views', 'country', 'count');
            })
            .catch(error => alert('Failed to load analytics'));
        }
    </script>
</body>
</html>
